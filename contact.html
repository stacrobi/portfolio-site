<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact | Stacey Robinson</title>
  <meta
    name="description"
    content="Contact Stacey Robinson, Senior Instructional Designer and Learning Strategist, for consulting, enterprise learning, and performance-focused training solutions."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Cormorant+Garamond:wght@500;600;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Stacey Robinson home">
        <span class="brand-mark">SR</span>
        <span class="brand-copy">
          <span class="brand-name">Stacey Robinson</span>
          <span class="brand-role">Senior Instructional Designer | Learning Consultant</span>
        </span>
      </a>

      <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
        Menu
      </button>

      <nav class="site-nav" id="site-nav" aria-label="Primary">
        <a href="index.html">Home</a>
        <a href="about.html">About Me</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <main>
      <section class="contact-page-hero">
        <div class="section-heading">
          <p class="eyebrow">Contact</p>
          <h1>Get in touch.</h1>
        </div>
      </section>

      <section class="contact-page-grid">
        <div class="contact-page-sidebar">
          <div class="contact-sidebar-block">
            <p class="contact-sidebar-label">Email</p>
            <a href="mailto:stacrobi@gmail.com">stacrobi@gmail.com</a>
          </div>

          <div class="contact-sidebar-block">
            <p class="contact-sidebar-label">Phone</p>
            <a href="tel:7043023641">704-302-3641</a>
          </div>

          <div class="contact-sidebar-block">
            <p class="contact-sidebar-label">LinkedIn</p>
            <a href="https://www.linkedin.com/in/stacrobi/" target="_blank" rel="noreferrer">linkedin.com/in/stacrobi</a>
          </div>
        </div>

        <form class="contact-form-panel" action="mailto:stacrobi@gmail.com" method="post" enctype="text/plain">
          <label class="contact-form-field">
            <span>Your Name*</span>
            <input type="text" name="name" autocomplete="name">
          </label>

          <label class="contact-form-field">
            <span>Email Address*</span>
            <input type="email" name="email" autocomplete="email">
          </label>

          <label class="contact-form-field">
            <span>Subject*</span>
            <input type="text" name="subject">
          </label>

          <label class="contact-form-field contact-form-field-large">
            <span>Tell me a little about your learning need or project goals*</span>
            <textarea name="message" rows="5"></textarea>
          </label>

          <div class="contact-form-actions">
            <button class="button button-primary" type="submit">Submit Form</button>
          </div>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <p>&copy; 2026 Stacey Robinson</p>
      <img class="footer-logo" src="stacey-botanical-logo.png" alt="Stacey Robinson botanical logo">
      <div class="footer-contact">
        <a href="mailto:stacrobi@gmail.com">stacrobi@gmail.com</a>
        <a href="tel:7043023641">704-302-3641</a>
        <a href="https://www.linkedin.com/in/stacrobi/" target="_blank" rel="noreferrer">LinkedIn</a>
      </div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
